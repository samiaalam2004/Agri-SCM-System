<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Lab | Agri-SCM</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Sora', sans-serif; }
        body { background: #0b220b; color: white; min-height: 100vh; padding: 30px; }

        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,215,0,0.2); }
        .logo { color: #ffd700; font-size: 24px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        
        /* Stats Cards */
        .stats-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #153a15; padding: 20px; border-radius: 15px; border-bottom: 4px solid #ffd700; transition: 0.3s; }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-card small { color: #aaa; text-transform: uppercase; font-size: 10px; font-weight: 700; }
        .stat-card h3 { font-size: 32px; color: #ffd700; margin-top: 5px; }

        /* Card for Table & Controls */
        .card { background: #112e11; padding: 25px; border-radius: 20px; border: 1px solid #1e4d1e; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .top-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; gap: 15px; }
        .search-box { background: #0b220b; border: 1px solid #2e6e2e; padding: 12px 20px; border-radius: 10px; color: white; flex: 1; outline: none; }
        
        .btn-group { display: flex; gap: 10px; }
        .btn { padding: 12px 20px; border-radius: 10px; font-weight: 700; border: none; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .btn-primary { background: #ffd700; color: #0b220b; }
        .btn-export { background: #27ae60; color: white; }
        .btn:hover { opacity: 0.8; transform: scale(1.02); }

        /* Table Styling */
        .table-wrapper { overflow-x: auto; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { background: rgba(255,215,0,0.1); color: #ffd700; padding: 18px; text-align: left; font-size: 12px; text-transform: uppercase; border-bottom: 2px solid #1e4d1e; }
        td { padding: 15px 18px; border-bottom: 1px solid #1e4d1e; font-size: 14px; background: rgba(255,255,255,0.02); }
        tr:hover td { background: rgba(255,255,255,0.05); }

        /* Score Bar & Badge */
        .score-bar { width: 100px; height: 6px; background: #222; border-radius: 10px; margin-top: 5px; }
        .score-fill { height: 100%; border-radius: 10px; transition: 0.5s; }
        
        .badge { padding: 5px 10px; border-radius: 6px; font-size: 10px; font-weight: 800; }
        .pass { background: #27ae60; color: white; }
        .fail { background: #e74c3c; color: white; }
        .pending { background: #f1c40f; color: #0b220b; }

        /* Modal Styling */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(5px); }
        .modal-content { background: #153a15; padding: 30px; border-radius: 20px; width: 450px; border: 1px solid #ffd700; animation: slideIn 0.3s; }
        @keyframes slideIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .modal-content input, .modal-content select { width: 100%; padding: 12px; margin: 10px 0 20px; border-radius: 8px; border: 1px solid #2e6e2e; background: #0b220b; color: white; }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <div class="logo"><i class="fa-solid fa-microscope"></i> AGRI-SCM LAB</div>
        <div style="display: flex; gap: 20px; align-items: center;">
            <span id="currentTime" style="color: #aaa; font-size: 13px;"></span>
            <button class="btn btn-export" onclick="exportData()"><i class="fa-solid fa-file-csv"></i> Export Data</button>
            <span style="color: #ff7675; cursor: pointer; font-weight: 700;" onclick="window.location.href='home.html'"><i class="fa-solid fa-power-off"></i> Exit</span>
        </div>
    </div>

    <!-- Stats Cards -->
    <div class="stats-container">
        <div class="stat-card"><small>Total Batches</small><h3 id="statTotal">0</h3></div>
        <div class="stat-card" style="border-color: #27ae60;"><small>Certified Pass</small><h3 id="statPass">0</h3></div>
        <div class="stat-card" style="border-color: #e74c3c;"><small>Rejected/Fail</small><h3 id="statFail">0</h3></div>
        <div class="stat-card" style="border-color: #f1c40f;"><small>Quality Score (Avg)</small><h3 id="statAvg">0%</h3></div>
    </div>

    <!-- QA Table and Controls -->
    <div class="card">
        <div class="top-controls">
            <input type="text" class="search-box" placeholder="🔍 Search by ID, Crop or Status..." onkeyup="searchBatch(this.value)">
            <button class="btn btn-primary" onclick="toggleModal(true)"><i class="fa-solid fa-plus"></i> New QA Entry</button>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Batch ID</th>
                        <th>Crop & Details</th>
                        <th>Moisture (%)</th>
                        <th>Temp (&deg;C)</th>
                        <th>QA Score</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="qualityTable"></tbody>
            </table>
        </div>
    </div>

    <!-- Modal for New QA Entry -->
    <div id="modal">
        <div class="modal-content">
            <h2 style="color: #ffd700; margin-bottom: 20px;">Lab Entry Form</h2>
            <label style="font-size: 11px; color: #ffd700;">PRODUCT NAME</label>
            <input type="text" id="mCrop" placeholder="e.g. Basmati Rice">
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div>
                    <label style="font-size: 11px; color: #ffd700;">MOISTURE %</label>
                    <input type="number" id="mMoist" placeholder="e.g. 14">
                </div>
                <div>
                    <label style="font-size: 11px; color: #ffd700;">TEMP &deg;C</label>
                    <input type="number" id="mTemp" placeholder="e.g. 24">
                </div>
            </div>

            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button class="btn btn-primary" onclick="saveNewBatch()" style="flex: 1; justify-content: center;">Confirm Entry</button>
                <button class="btn" onclick="toggleModal(false)" style="background: #333; color: white; flex: 1; justify-content: center;">Discard</button>
            </div>
        </div>
    </div>

    <script>
        // Load or initialize batches
        let batches = JSON.parse(localStorage.getItem("qa_batches_v2")) || [
            { id: "QA-9001", crop: "Premium Wheat", moisture: 12, temp: 22, score: 95, status: "PASSED" },
            { id: "QA-9002", crop: "Red Chili", moisture: 19, temp: 28, score: 45, status: "FAILED" }
        ];

        // Calculate QA score based on moisture and temperature
        function calculateScore(moist, temp) {
            let score = 100;
            if (moist > 15) score -= (moist - 15) * 10;
            if (moist < 10) score -= (10 - moist) * 10;
            if (temp > 25) score -= (temp - 25) * 5;
            return Math.max(0, Math.min(100, score));
        }

        // Render QA table
        function renderTable() {
            const tableBody = document.getElementById("qualityTable");
            tableBody.innerHTML = "";
            
            batches.forEach((b, index) => {
                const sColor = b.score > 80 ? '#27ae60' : (b.score > 50 ? '#f1c40f' : '#e74c3c');
                const statusClass = b.status.toLowerCase();
                
                tableBody.innerHTML += `
                    <tr>
                        <td><b style="color:#ffd700">${b.id}</b></td>
                        <td>${b.crop}</td>
                        <td>${b.moisture}%</td>
                        <td>${b.temp}°C</td>
                        <td>
                            <div style="font-size:12px; margin-bottom:3px">${b.score}%</div>
                            <div class="score-bar"><div class="score-fill" style="width:${b.score}%; background:${sColor}"></div></div>
                        </td>
                        <td><span class="badge ${statusClass}">${b.status}</span></td>
                        <td>
                            <select onchange="updateStatus(${index}, this.value)" style="background:#0b220b; color:white; border:1px solid #2e6e2e; border-radius:5px; padding:5px;">
                                <option value="PENDING" ${b.status==='PENDING'?'selected':''}>Hold</option>
                                <option value="PASSED" ${b.status==='PASSED'?'selected':''}>Approve</option>
                                <option value="FAILED" ${b.status==='FAILED'?'selected':''}>Reject</option>
                            </select>
                        </td>
                    </tr>
                `;
            });
            updateStats();
        }

        // Save a new batch from modal
        function saveNewBatch() {
            const crop = document.getElementById("mCrop").value;
            const moist = parseFloat(document.getElementById("mMoist").value);
            const temp = parseFloat(document.getElementById("mTemp").value);

            if (!crop || isNaN(moist)) return alert("Please fill all data!");

            const score = calculateScore(moist, temp);
            const newBatch = {
                id: "QA-" + Math.floor(1000 + Math.random() * 9000),
                crop: crop,
                moisture: moist,
                temp: temp || 25,
                score: score,
                status: score > 60 ? "PASSED" : "FAILED"
            };

            batches.unshift(newBatch);
            saveData();
            toggleModal(false);
        }

        // Update status manually
        function updateStatus(idx, val) {
            batches[idx].status = val;
            saveData();
        }

        // Save data to localStorage
        function saveData() {
            localStorage.setItem("qa_batches_v2", JSON.stringify(batches));
            renderTable();
        }

        // Update dashboard stats
        function updateStats() {
            const pass = batches.filter(b => b.status === "PASSED").length;
            const fail = batches.filter(b => b.status === "FAILED").length;
            const avgScore = batches.length ? Math.round(batches.reduce((a, b) => a + b.score, 0) / batches.length) : 0;

            document.getElementById("statTotal").innerText = batches.length;
            document.getElementById("statPass").innerText = pass;
            document.getElementById("statFail").innerText = fail;
            document.getElementById("statAvg").innerText = avgScore + "%";
        }

        // Export table to CSV
        function exportData() {
            let csv = "Batch ID,Crop,Moisture,Temp,Score,Status\n";
            batches.forEach(b => {
                csv += `${b.id},${b.crop},${b.moisture},${b.temp},${b.score},${b.status}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Agri-SCM-QA-Report.csv';
            a.click();
        }

        // Search function for batches
        function searchBatch(q) {
            const rows = document.querySelectorAll("#qualityTable tr");
            rows.forEach(r => r.style.display = r.innerText.toLowerCase().includes(q.toLowerCase()) ? "" : "none");
        }

        // Toggle modal visibility
        function toggleModal(show) { document.getElementById("modal").style.display = show ? 'flex' : 'none'; }
        
        // Update live clock
        setInterval(() => {
            document.getElementById("currentTime").innerText = new Date().toLocaleString();
        }, 1000);

        window.onload = renderTable;
    </script>
</body>
</html>
