<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Fleet Tracker | Agri-SCM</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Sora', sans-serif; }
        body { background: #001a11; color: white; display: grid; grid-template-columns: 380px 1fr; height: 100vh; overflow: hidden; }
        
        .sidebar { background: #012217; padding: 25px; border-right: 1px solid rgba(255,215,0,0.2); overflow-y: auto; }
        .sidebar-header { margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }

        .ship-item { 
            background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; 
            margin-bottom: 15px; cursor: pointer; border: 1px solid transparent; transition: 0.3s;
        }
        .active-ship { background: rgba(255,215,0,0.1); border-color: #ffd700; }

        /* Progress Bar in Sidebar */
        .mini-progress { width: 100%; height: 4px; background: #222; border-radius: 10px; margin-top: 10px; overflow: hidden; }
        .mini-bar { height: 100%; background: #ffd700; transition: 0.5s; }

        /* Map UI Overlay */
        #map { width: 100%; height: 100%; }
        .stats-card {
            position: absolute; bottom: 30px; left: 410px; z-index: 1000;
            background: rgba(1, 34, 23, 0.9); padding: 20px; border-radius: 20px;
            border: 1px solid #ffd700; backdrop-filter: blur(10px); min-width: 280px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .back-btn { 
            position: absolute; top: 20px; right: 20px; z-index: 1000;
            background: #ffd700; color: #013220; padding: 12px 20px;
            border-radius: 12px; text-decoration: none; font-weight: 700;
        }
    </style>
</head>
<body>

    <!-- Sidebar with Fleet List -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h2 style="color: #ffd700;"><i class="fa-solid fa-satellite"></i> Live Satellite</h2>
            <p style="font-size: 11px; opacity: 0.5; text-transform: uppercase;">Fleet Management System</p>
        </div>
        <div id="fleetList"></div>
    </div>

    <!-- Map Area -->
    <div style="position: relative;">
        <a href="field supervisor_dashboard.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Exit</a>
        
        <!-- Fleet Stats Overlay -->
        <div class="stats-card" id="statsOverlay" style="display:none;">
            <h4 id="activeID" style="color: #ffd700; margin-bottom: 5px;">---</h4>
            <p id="activeRoute" style="font-size: 12px; opacity: 0.7; margin-bottom: 15px;"></p>
            
            <div style="display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px;">
                <span><i class="fa-solid fa-road" style="color:#3498db;"></i> Covered: <b id="kmCovered">0</b> km</span>
                <span><i class="fa-solid fa-clock" style="color:#ff4d4d;"></i> Remaining: <b id="kmLeft">0</b> km</span>
            </div>
            
            <div class="mini-progress" style="height: 8px;"><div class="mini-bar" id="mainPBar"></div></div>
            <p id="jamAlert" style="font-size: 11px; color: #ff4d4d; margin-top: 10px; display: none;">
                <i class="fa-solid fa-triangle-exclamation"></i> High Traffic/Delay detected on remaining route!
            </p>
        </div>

        <!-- Map Container -->
        <div id="map"></div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // Initialize the map
        const map = L.map('map').setView([23.8103, 90.4125], 7);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        // Load active shipments from localStorage
        const fleetList = JSON.parse(localStorage.getItem("activeShipments")) || [];
        const container = document.getElementById('fleetList');
        let currentBluePath = null;
        let currentRedPath = null;
        let activeMarker = null;

        // Simulated Route Coordinates
        const routePaths = {
            "Dhaka - Bogura": [[23.81, 90.41], [23.95, 90.28], [24.15, 90.05], [24.45, 89.65], [24.84, 89.37]],
            "default": [[23.81, 90.41], [24.00, 90.00], [24.50, 89.50], [25.00, 89.00]]
        };

        function init() {
            if(fleetList.length === 0) {
                container.innerHTML = "<p style='text-align:center; opacity:0.5; margin-top:50px;'>No active fleet.</p>";
                return;
            }

            fleetList.forEach((ship, index) => {
                const item = document.createElement('div');
                item.className = `ship-item ${index === 0 ? 'active-ship' : ''}`;
                item.id = `item-${index}`;
                item.onclick = () => trackFleet(index);

                const progress = ship.progress || 40; // Default progress 40%

                item.innerHTML = `
                    <div style="display:flex; justify-content:space-between;">
                        <strong>${ship.id}</strong>
                        <small style="color:#ffd700;">${progress}%</small>
                    </div>
                    <p style="font-size:12px; margin:4px 0;">${ship.route}</p>
                    <div class="mini-progress"><div class="mini-bar" style="width:${progress}%"></div></div>
                `;
                container.appendChild(item);
            });

            trackFleet(0);
        }

        function trackFleet(index) {
            const ship = fleetList[index];
            const progress = ship.progress || 40;
            const pathCoords = routePaths[ship.route] || routePaths["default"];

            // Update Stats Overlay
            document.getElementById('statsOverlay').style.display = 'block';
            document.getElementById('activeID').innerText = ship.id;
            document.getElementById('activeRoute').innerText = "Path: " + ship.route;
            document.getElementById('mainPBar').style.width = progress + "%";

            // Approximate distance calculations
            const totalKm = 200;
            const covered = (totalKm * (progress/100)).toFixed(1);
            const left = (totalKm - covered).toFixed(1);
            document.getElementById('kmCovered').innerText = covered;
            document.getElementById('kmLeft').innerText = left;
            document.getElementById('jamAlert').style.display = progress < 90 ? 'block' : 'none';

            // Remove previous paths and marker
            if(currentBluePath) map.removeLayer(currentBluePath);
            if(currentRedPath) map.removeLayer(currentRedPath);
            if(activeMarker) map.removeLayer(activeMarker);

            // Blue path = covered route
            const blueSegment = pathCoords.slice(0, Math.ceil(pathCoords.length * (progress/100)) + 1);
            currentBluePath = L.polyline(blueSegment, {color: '#3498db', weight: 5, opacity: 0.9}).addTo(map);

            // Red path = remaining route
            const redSegment = pathCoords.slice(Math.floor(pathCoords.length * (progress/100)));
            currentRedPath = L.polyline(redSegment, {color: '#ff4d4d', weight: 5, opacity: 0.7, dashArray: '10, 10'}).addTo(map);

            // Current position marker
            const currentPos = blueSegment[blueSegment.length - 1];
            activeMarker = L.circleMarker(currentPos, {
                radius: 10, fillColor: "#ffd700", color: "#fff", weight: 2, fillOpacity: 1
            }).addTo(map).bindPopup(ship.id + " is here").openPopup();

            map.flyTo(currentPos, 9, {animate: true, duration: 1});

            // Highlight active ship in sidebar
            document.querySelectorAll('.ship-item').forEach(el => el.classList.remove('active-ship'));
            document.getElementById(`item-${index}`).classList.add('active-ship');
        }

        window.onload = init;
    </script>
</body>
</html>
