<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Supervisor v2 | Agri-SCM</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Sora', sans-serif; }
        body { background: radial-gradient(circle at top, #002e1f 0%, #000a07 100%); color: white; min-height: 100vh; padding-bottom: 50px; overflow-x: hidden; }
        
        /* Navigation */
        nav { 
            padding: 15px 40px; 
            background: rgba(0,0,0,0.4); 
            backdrop-filter: blur(15px);
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid #ffd700; 
            position: sticky; top: 0; z-index: 1000;
        }

        .container { padding: 30px; max-width: 1300px; margin: 0 auto; }

        /* Stats Section with Hover Effect */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { 
            background: rgba(255,255,255,0.05); padding: 25px; border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.1); transition: 0.3s;
            position: relative; overflow: hidden;
        }
        .stat-card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.08); border-color: #ffd700; }
        .stat-card h4 { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card p { font-size: 28px; font-weight: 700; color: #ffd700; margin-top: 5px; }

        /* Main Table Card */
        .card { 
            background: rgba(255,255,255,0.02); padding: 35px; border-radius: 30px; 
            border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 25px 50px rgba(0,0,0,0.5); 
        }
        
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 20px; }
        h2 { color: #ffd700; font-size: 24px; letter-spacing: -0.5px; }

        .search-wrapper { position: relative; }
        #searchBox { 
            padding: 12px 20px 12px 45px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(0,0,0,0.3); color: white; outline: none; width: 300px; transition: 0.3s;
        }
        #searchBox:focus { border-color: #ffd700; width: 350px; background: rgba(0,0,0,0.5); }
        .search-wrapper i { position: absolute; left: 15px; top: 15px; color: #ffd700; opacity: 0.7; }

        /* Modern Table */
        .table-container { border-radius: 15px; overflow: hidden; background: rgba(255,255,255,0.02); }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(255, 215, 0, 0.05); text-align: left; color: #ffd700; padding: 18px; font-size: 12px; text-transform: uppercase; }
        td { padding: 18px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 14px; }
        tr:last-child td { border: none; }

        /* Status & Badges */
        .badge { padding: 5px 12px; border-radius: 100px; font-size: 10px; font-weight: 700; }
        .bg-transit { background: #3498db; color: white; box-shadow: 0 0 10px rgba(52,152,219,0.3); }
        .bg-delayed { background: #e74c3c; color: white; box-shadow: 0 0 10px rgba(231,76,60,0.3); }
        .bg-scheduled { background: #f1c40f; color: #000; }

        /* Action Buttons */
        .btn-group { display: flex; gap: 15px; margin-top: 35px; flex-wrap: wrap; }
        .btn { 
            padding: 14px 25px; border-radius: 15px; text-decoration: none; font-weight: 700; 
            cursor: pointer; display: inline-flex; align-items: center; gap: 10px; border: none; 
            font-size: 14px; transition: 0.3s;
        }
        .btn-add { background: #ffd700; color: #013220; }
        .btn-track { background: transparent; border: 1px solid #2ecc71; color: #2ecc71; }
        .btn-pdf { background: rgba(231, 76, 60, 0.1); color: #e74c3c; border: 1px solid #e74c3c; }
        .btn:hover { transform: translateY(-3px); filter: brightness(1.1); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }

        .action-icon { cursor: pointer; margin-right: 12px; opacity: 0.6; transition: 0.2s; }
        .action-icon:hover { opacity: 1; color: #ffd700; }

        /* Toast Notification */
        #toast {
            position: fixed; bottom: 30px; right: 30px; background: #ffd700; color: #000;
            padding: 15px 30px; border-radius: 10px; font-weight: 700; display: none;
            z-index: 2000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

    <div id="toast">Action Successful!</div>

    <nav>
        <strong>🚜 AGRI-SCM <span style="font-weight: 400; opacity: 0.6; margin-left: 5px;">| Supervisor v2.0</span></strong>
        <div style="display: flex; align-items: center; gap: 25px;">
            <div style="text-align: right;">
                <p id="clock" style="color: #ffd700; font-family: monospace; font-size: 16px; font-weight: 700;"></p>
                <p style="font-size: 10px; opacity: 0.5; text-transform: uppercase;">Real-time Monitoring</p>
            </div>
            <a href="home.html" class="btn" style="padding: 8px 15px; font-size: 11px; background: rgba(255,255,255,0.1); color: white;">LOGOUT</a>
        </div>
    </nav>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <h4>Total Shipments</h4>
                <p id="totalFleets">0</p>
                <i class="fa-solid fa-box-archive" style="position:absolute; right:20px; bottom:20px; opacity:0.1; font-size:40px;"></i>
            </div>
            <div class="stat-card">
                <h4>Fleet In-Motion</h4>
                <p id="transitFleets" style="color: #3498db;">0</p>
                <i class="fa-solid fa-truck-fast" style="position:absolute; right:20px; bottom:20px; opacity:0.1; font-size:40px;"></i>
            </div>
            <div class="stat-card">
                <h4>Issues & Delays</h4>
                <p id="delayedFleets" style="color: #e74c3c;">0</p>
                <i class="fa-solid fa-triangle-exclamation" style="position:absolute; right:20px; bottom:20px; opacity:0.1; font-size:40px;"></i>
            </div>
        </div>

        <div class="card">
            <div class="header-flex">
                <h2><i class="fa-solid fa-shield-halved" style="margin-right:10px;"></i> Operational Overview</h2>
                <div class="search-wrapper">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="searchBox" placeholder="Search by Fleet ID or Route..." onkeyup="filterTable()">
                </div>
            </div>
            
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Shipment ID</th>
                            <th>Fleet Unit</th>
                            <th>Route Detail</th>
                            <th>Status</th>
                            <th>ETA</th>
                            <th>Management</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>

            <div class="btn-group">
                <a href="transport_schedule.html" class="btn btn-add"><i class="fa-solid fa-calendar-plus"></i> New Schedule</a>
                <a href="shipment_tracking.html" class="btn btn-track"><i class="fa-solid fa-location-crosshairs"></i> Live Map Tracker</a>
                <button onclick="downloadPDF()" class="btn btn-pdf"><i class="fa-solid fa-file-pdf"></i> Generate PDF</button>
                <button onclick="exportToCSV()" class="btn" style="background: rgba(46, 204, 113, 0.1); color: #2ecc71; border: 1px solid #2ecc71;"><i class="fa-solid fa-file-excel"></i> Export CSV</button>
            </div>
        </div>
    </div>

    <script>
        function showToast(msg) {
            const toast = document.getElementById("toast");
            toast.innerText = msg;
            toast.style.display = "block";
            setTimeout(() => { toast.style.display = "none"; }, 3000);
        }

        function loadData() {
            const list = JSON.parse(localStorage.getItem("activeShipments")) || [];
            const body = document.getElementById("tableBody");
            
            // Stats Update
            document.getElementById("totalFleets").innerText = list.length;
            document.getElementById("transitFleets").innerText = list.filter(s => s.status === 'In Transit').length;
            document.getElementById("delayedFleets").innerText = list.filter(s => s.status === 'Delayed').length;

            body.innerHTML = list.length === 0 ? "<tr><td colspan='6' align='center' style='padding:60px; opacity:0.3; font-style:italic;'>Waiting for operational data...</td></tr>" : "";
            
            list.forEach((s, i) => {
                let badgeClass = "bg-scheduled";
                if(s.status === "In Transit") badgeClass = "bg-transit";
                if(s.status === "Delayed") badgeClass = "bg-delayed";

                body.innerHTML += `
                    <tr>
                        <td style="font-family:monospace; color:#ffd700;">#${s.id}</td>
                        <td><strong>${s.vehicle}</strong></td>
                        <td style="font-size:13px; opacity:0.8;">${s.route}</td>
                        <td><span class="badge ${badgeClass}">${s.status}</span></td>
                        <td>${s.eta}</td>
                        <td>
                            <i class="fa-solid fa-rotate action-icon" onclick="updateStatus(${i})" title="Change Status"></i>
                            <i class="fa-solid fa-trash-can action-icon" style="color:#ff4d4d;" onclick="removeItem(${i})" title="Remove"></i>
                        </td>
                    </tr>
                `;
            });
        }

        function updateStatus(i) {
            let list = JSON.parse(localStorage.getItem("activeShipments"));
            const statuses = ["Scheduled", "In Transit", "Delayed"];
            let currentIdx = statuses.indexOf(list[i].status);
            let nextIdx = (currentIdx + 1) % statuses.length;
            list[i].status = statuses[nextIdx];
            
            localStorage.setItem("activeShipments", JSON.stringify(list));
            loadData();
            showToast("Status updated to: " + list[i].status);
        }

        function filterTable() {
            let input = document.getElementById("searchBox").value.toLowerCase();
            let rows = document.getElementById("tableBody").getElementsByTagName("tr");
            for (let row of rows) {
                row.style.display = row.innerText.toLowerCase().includes(input) ? "" : "none";
            }
        }

        function removeItem(i) {
            if(confirm("Permanent Delete? This action cannot be undone.")) {
                let list = JSON.parse(localStorage.getItem("activeShipments"));
                list.splice(i, 1);
                localStorage.setItem("activeShipments", JSON.stringify(list));
                loadData();
                showToast("Shipment record removed.");
            }
        }

        // CSV Export Feature
        function exportToCSV() {
            const list = JSON.parse(localStorage.getItem("activeShipments")) || [];
            if(list.length === 0) return alert("No data to export!");
            
            let csvContent = "data:text/csv;charset=utf-8,ID,Vehicle,Route,Status,ETA\n";
            list.forEach(s => {
                csvContent += `${s.id},${s.vehicle},${s.route},${s.status},${s.eta}\n`;
            });
            
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "Fleet_Report_AgriSCM.csv");
            document.body.appendChild(link);
            link.click();
            showToast("Excel/CSV File Downloaded!");
        }

        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(22);
            doc.setTextColor(0, 46, 31);
            doc.text("AGRI-SCM OPERATIONAL REPORT", 14, 20);
            
            const list = JSON.parse(localStorage.getItem("activeShipments")) || [];
            const rows = list.map(s => [s.id, s.vehicle, s.route, s.status, s.eta]);
            
            doc.autoTable({ 
                head: [['ID', 'Vehicle', 'Route', 'Status', 'ETA']], 
                body: rows, 
                startY: 30,
                theme: 'striped',
                headStyles: { fillColor: [0, 46, 31] }
            });
            doc.save("Fleet_Report.pdf");
        }

        setInterval(() => { 
            document.getElementById('clock').innerText = new Date().toLocaleTimeString(); 
        }, 1000);

        window.onload = loadData;
    </script>
</body>
</html>
