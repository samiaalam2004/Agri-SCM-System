<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farmer Dashboard | Premium Agri-SCM</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
    * { box-sizing: border-box; margin:0; padding:0; font-family:'Sora',sans-serif; }
    
    body { 
        background: radial-gradient(circle at top, #1a3c1a 0%, #050a05 100%); 
        min-height:100vh; 
        color:#333; 
        padding-bottom: 50px;
    }

    /* Modern Navigation */
    nav {
        background: rgba(10, 31, 10, 0.9);
        backdrop-filter: blur(15px);
        padding: 15px 5%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: sticky;
        top: 0;
        z-index: 1000;
        border-bottom: 2px solid #f1c40f;
    }
    nav strong { color: #f1c40f; font-size: 20px; letter-spacing: 1px; }
    nav .nav-links a { 
        color: white; 
        text-decoration: none; 
        margin-left: 25px; 
        font-weight: 500; 
        transition: 0.3s;
        font-size: 14px;
    }
    nav .nav-links a:hover { color: #f1c40f; }

    /* Dashboard Container */
    .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }

    /* Stats Section with Hover Effect */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; margin-bottom: 40px; }
    .stat-card { 
        background: linear-gradient(145deg, #f1c40f, #d4ac0d); 
        padding: 25px; 
        border-radius: 25px; 
        text-align: center; 
        box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        transition: 0.3s;
        border: 1px solid rgba(255,255,255,0.2);
    }
    .stat-card:hover { transform: translateY(-10px); }
    .stat-card h3 { color: #1a3c1a; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
    .stat-card p { font-size: 32px; font-weight: 800; color: #1a3c1a; }

    /* Main Content Area */
    .card { 
        background: rgba(255, 255, 255, 0.98); 
        padding: 40px; 
        border-radius: 35px; 
        box-shadow: 0 25px 50px rgba(0,0,0,0.4); 
    }
    
    .header-actions { 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        margin-bottom: 30px; 
        flex-wrap: wrap;
        gap: 20px;
    }
    h2 { color: #1a3c1a; font-weight: 800; font-size: 24px; }

    /* Search and Add Buttons */
    .search-box { position: relative; }
    .search-box i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #888; }
    #searchInput { 
        padding: 12px 15px 12px 40px; 
        border-radius: 15px; 
        border: 1px solid #ddd; 
        width: 300px; 
        outline: none; 
        transition: 0.3s;
    }
    #searchInput:focus { border-color: #1a3c1a; box-shadow: 0 0 0 3px rgba(26,60,26,0.1); }

    .add-btn { 
        padding: 14px 28px; 
        background: #1a3c1a; 
        color: #f1c40f; 
        border-radius: 18px; 
        text-decoration: none; 
        font-weight: 700; 
        transition: 0.4s; 
        display: inline-flex;
        align-items: center;
        gap: 10px;
    }
    .add-btn:hover { background: #27ae60; color: white; transform: scale(1.05); }

    /* Premium Table Styling */
    .table-responsive { overflow-x: auto; }
    table { width: 100%; border-collapse: separate; border-spacing: 0 12px; }
    th { padding: 15px; text-align: left; color: #666; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
    td { padding: 20px 15px; background: #fdfdfd; border-top: 1px solid #eee; border-bottom: 1px solid #eee; }
    
    tr td:first-child { border-radius: 20px 0 0 20px; border-left: 1px solid #eee; font-weight: 700; color: #1a3c1a; }
    tr td:last-child { border-radius: 0 20px 20px 0; border-right: 1px solid #eee; }
    
    tr:hover td { background: #f1f8f1; border-color: #27ae60; }

    /* Status Badge */
    .status-badge { 
        padding: 6px 14px; 
        border-radius: 12px; 
        font-size: 11px; 
        font-weight: 700; 
        background: #e8f5e9; 
        color: #2e7d32;
        border: 1px solid #c8e6c9;
    }

    /* Delete Button */
    .delete-btn { 
        color: #e74c3c; 
        cursor: pointer; 
        font-size: 18px; 
        transition: 0.3s; 
        padding: 10px;
        border-radius: 10px;
    }
    .delete-btn:hover { background: rgba(231, 76, 60, 0.1); color: #c0392b; transform: rotate(15deg); }

    @media (max-width: 768px) {
        #searchInput { width: 100%; }
        .header-actions { flex-direction: column; align-items: stretch; }
        nav { padding: 15px 20px; }
    }
</style>
</head>
<body>

<nav>
    <strong>👑 AGRI-SCM</strong>
    <div class="nav-links">
        <a href="agriculture_dashboard.html"><i class="fa-solid fa-house"></i> Home</a>
        <a href="add_product.html"><i class="fa-solid fa-plus-circle"></i> Add Crop</a>
        <a href="home.html" style="color:#ff7675;"><i class="fa-solid fa-power-off"></i> Logout</a>
    </div>
</nav>

<div class="container">
    <div class="stats-grid">
        <div class="stat-card">
            <h3>Total Crop Varieties</h3>
            <p id="totalCrops">0</p>
        </div>
        <div class="stat-card">
            <h3>Peak Shelf Life</h3>
            <p id="avgShelf">0 Days</p>
        </div>
        <div class="stat-card">
            <h3>Active Batches</h3>
            <p>Live</p>
        </div>
    </div>

    <div class="card">
        <div class="header-actions">
            <h2>My Produced Crops</h2>
            <div style="display:flex; gap:15px; flex-wrap: wrap;">
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="searchInput" placeholder="Search by crop name..." onkeyup="filterTable()">
                </div>
                <a href="add_product.html" class="add-btn"><i class="fa-solid fa-plus"></i> New Batch</a>
            </div>
        </div>

        <div class="table-responsive">
            <table id="cropTable">
                <thead>
                    <tr>
                        <th>Crop Name</th>
                        <th>Planting Date</th>
                        <th>Harvest Date</th>
                        <th>Shelf Life</th>
                        <th>Current Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
const tableBody = document.getElementById('tableBody');

// Initialize with sophisticated default data if local storage is empty
function initData() {
    if(!localStorage.getItem('crops')){
        const defaultCrops = [
            { cropName:"Cucumber", plantingDate:"2026-12-03", harvestDate:"2026-12-04", shelfLife:40 },
            { cropName:"Organic Tomato", plantingDate:"2026-03-18", harvestDate:"2026-04-12", shelfLife:40 },
            { cropName:"Fresh Potato", plantingDate:"2026-02-20", harvestDate:"2026-04-20", shelfLife:30 },
            { cropName:"Sweet Carrot", plantingDate:"2026-03-05", harvestDate:"2026-03-25", shelfLife:15 }
        ];
        localStorage.setItem('crops', JSON.stringify(defaultCrops));
    }
    loadCrops();
}

// Render Table Function
function loadCrops(){
    const crops = JSON.parse(localStorage.getItem('crops') || '[]');
    tableBody.innerHTML = "";

    // Stats Logic
    document.getElementById('totalCrops').textContent = crops.length;
    const maxShelf = crops.length > 0 ? Math.max(...crops.map(c => parseInt(c.shelfLife))) : 0;
    document.getElementById('avgShelf').textContent = maxShelf + " Days";

    crops.forEach((crop, index) => {
        const row = `
            <tr>
                <td>${crop.cropName}</td>
                <td><i class="fa-solid fa-calendar-day" style="color:#27ae60; margin-right:8px;"></i>${crop.plantingDate}</td>
                <td><i class="fa-solid fa-calendar-check" style="color:#f39c12; margin-right:8px;"></i>${crop.harvestDate}</td>
                <td><i class="fa-solid fa-hourglass-half" style="color:#3498db; margin-right:8px;"></i>${crop.shelfLife} Days</td>
                <td><span class="status-badge">Ready for Transport</span></td>
                <td>
                    <i class="fa-solid fa-trash-can delete-btn" title="Delete Batch" onclick="deleteCrop(${index})"></i>
                </td>
            </tr>
        `;
        tableBody.innerHTML += row;
    });
}

// Delete Logic
function deleteCrop(index){
    if(confirm("Warning: This will permanently remove this batch record. Proceed?")){
        let crops = JSON.parse(localStorage.getItem('crops') || '[]');
        crops.splice(index, 1);
        localStorage.setItem('crops', JSON.stringify(crops));
        loadCrops();
    }
}

// Search/Filter Logic
function filterTable(){
    let input = document.getElementById("searchInput").value.toLowerCase();
    let rows = tableBody.getElementsByTagName("tr");
    for(let row of rows){
        let text = row.cells[0].textContent.toLowerCase();
        row.style.display = text.includes(input) ? "" : "none";
    }
}

// Run on Load
window.onload = initData;
</script>

</body>
</html>
