<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agri-SCM | Pro Inventory v2.0</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Sora', sans-serif; }
  body { background: radial-gradient(circle at top right, #1a3c1a 0%, #051205 100%); min-height: 100vh; color: #fff; padding-bottom: 50px; }

  header {
    background: rgba(10, 31, 10, 0.9); backdrop-filter: blur(15px);
    padding: 15px 5%; display: flex; justify-content: space-between; align-items: center;
    position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid #f1c40f;
  }
  header h2 { color: #f1c40f; font-size: 22px; }

  .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }

  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
  .stat-card { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); text-align: center; transition: 0.3s; }
  .stat-card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.08); }
  .stat-card i { color: #f1c40f; font-size: 28px; margin-bottom: 12px; }
  .stat-card h4 { font-size: 13px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
  .stat-card p { font-size: 28px; font-weight: 700; color: #f1c40f; }

  .table-tools { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px; }
  .search-container { position: relative; flex-grow: 1; max-width: 400px; }
  .search-container i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #f1c40f; }
  #searchBox { padding: 14px 15px 14px 45px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: #fff; width: 100%; outline: none; transition: 0.3s; }
  
  .btn { padding: 12px 20px; border-radius: 15px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px; font-size: 14px; }
  .btn-add { background: #f1c40f; color: #1a3c1a; }
  .btn-export { background: transparent; color: #f1c40f; border: 1px solid #f1c40f; }

  .table-card { background: rgba(255,255,255,0.02); border-radius: 30px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 30px 60px rgba(0,0,0,0.5); }
  table { width: 100%; border-collapse: collapse; min-width: 800px; }
  th { background: #f1c40f; color: #1a3c1a; padding: 20px; text-align: left; font-size: 12px; text-transform: uppercase; }
  td { padding: 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }

  .badge { padding: 6px 14px; border-radius: 12px; font-size: 10px; font-weight: 800; display: inline-block; }
  .ok { background: rgba(46, 204, 113, 0.15); color: #2ecc71; border: 1px solid #2ecc71; }
  .low { background: rgba(231, 76, 60, 0.15); color: #e74c3c; border: 1px solid #e74c3c; animation: pulse 2s infinite; }

  .action-group { display: flex; gap: 8px; }
  .action-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; width: 32px; height: 32px; border-radius: 8px; cursor: pointer; transition: 0.2s; }
  .btn-plus:hover { background: #2ecc71; }
  .btn-minus:hover { background: #e67e22; }
  .btn-edit:hover { background: #3498db; }
  .btn-del:hover { background: #e74c3c; }

  /* Modal */
  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 2000; justify-content: center; align-items: center; }
  .modal-content { background: #1a3c1a; padding: 35px; border-radius: 35px; width: 100%; max-width: 450px; border: 2px solid #f1c40f; }
  .modal-content input, .modal-content select { width: 100%; padding: 14px; margin-bottom: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: white; outline: none; }

  #notif { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 15px 35px; background: #f1c40f; color: #1a3c1a; border-radius: 15px; font-weight: 800; display: none; z-index: 3000; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
</style>
</head>

<body>

<header>
  <h2><i class="fa-solid fa-boxes-packing"></i> AGRI-SCM <span style="font-weight: 400; opacity: 0.7;">Inventory</span></h2>
  <nav><a href="home.html" style="color:#e74c3c; font-weight:700; text-decoration: none;"><i class="fa-solid fa-door-open"></i> LOGOUT</a></nav>
</header>

<div class="container">
  <div class="stats-row">
    <div class="stat-card"><i class="fa-solid fa-scale-balanced"></i><h4>Total Stock</h4><p id="totalWeight">0 kg</p></div>
    <div class="stat-card"><i class="fa-solid fa-circle-exclamation"></i><h4>Stock Alerts</h4><p id="alertCount">0</p></div>
    <div class="stat-card"><i class="fa-solid fa-chart-pie"></i><h4>Warehouse Load</h4><p id="capacityPercent">0%</p></div>
  </div>

  <div class="table-tools">
    <div class="search-container"><i class="fa-solid fa-magnifying-glass"></i><input type="text" id="searchBox" placeholder="Search..." onkeyup="searchTable()"></div>
    <div class="tool-btns">
      <button class="btn btn-export" onclick="exportToExcel()"><i class="fa-solid fa-file-excel"></i> EXCEL</button>
      <button class="btn btn-add" onclick="openAddModal()"><i class="fa-solid fa-plus"></i> ADD PRODUCT</button>
    </div>
  </div>

  <div class="table-card">
    <div class="table-responsive">
      <table>
        <thead><tr><th>Product Details</th><th>Batch ID</th><th>Quality</th><th>Current Stock</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody id="inventoryTable"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal" id="cropModal">
  <div class="modal-content">
    <h3 id="modalTitle">📦 Register New Batch</h3>
    <input type="hidden" id="editIndex">
    <label>Product Name</label><input type="text" id="newName">
    <label>Farm Origin</label><input type="text" id="newOrigin">
    <label>Grade / Quality</label>
    <select id="newQuality">
        <option value="A+ Grade">A+ Premium</option>
        <option value="A Grade">A Grade</option>
        <option value="B Grade">B Grade</option>
    </select>
    <label>Quantity (kg)</label><input type="number" id="newQty">
    <div style="display:flex; gap:10px;">
      <button class="btn btn-add" style="flex:2; justify-content:center;" onclick="saveCrop()">SAVE TO SYSTEM</button>
      <button class="btn btn-export" style="flex:1; justify-content:center; border-color:#e74c3c; color:#e74c3c" onclick="toggleModal(false)">CLOSE</button>
    </div>
  </div>
</div>

<div id="notif"></div>

<script>
let inventory = JSON.parse(localStorage.getItem("agriInventory") || "[]");
if(inventory.length === 0) {
    inventory = [
        { "name":"Red Tomato", "qty":450, "quality":"A Grade", "origin":"Dhaka Farm", "batch":"BATCH-771" },
        { "name":"Fresh Potato", "qty":800, "quality":"A+ Grade", "origin":"Bogura Agri", "batch":"BATCH-229" }
    ];
}

function renderInventory() {
  const table = document.getElementById("inventoryTable");
  table.innerHTML = "";
  inventory.forEach((item, index) => {
    const isLow = item.qty < 50;
    table.innerHTML += `
      <tr>
        <td><div class="crop-info"><strong>${item.name}</strong><span><i class="fa-solid fa-location-dot"></i> ${item.origin}</span></div></td>
        <td><span class="batch-tag">${item.batch}</span></td>
        <td><span style="font-size:12px; color:#aaa">${item.quality}</span></td>
        <td style="font-weight:700; font-size:18px;">${item.qty} <small style="font-size:12px; color:#666">kg</small></td>
        <td><span class="badge ${isLow ? 'low' : 'ok'}">${isLow ? 'REPLENISH' : 'OPTIMAL'}</span></td>
        <td>
          <div class="action-group">
            <button class="action-btn btn-plus" onclick="modifyStock(${index}, 50)"><i class="fa-solid fa-plus"></i></button>
            <button class="action-btn btn-minus" onclick="modifyStock(${index}, -50)"><i class="fa-solid fa-minus"></i></button>
            <button class="action-btn btn-edit" onclick="openEditModal(${index})"><i class="fa-solid fa-pen"></i></button>
            <button class="action-btn btn-del" onclick="deleteItem(${index})"><i class="fa-solid fa-trash"></i></button>
          </div>
        </td>
      </tr>`;
  });
  updateAnalytics();
  localStorage.setItem("agriInventory", JSON.stringify(inventory));
}

function updateAnalytics() {
  let total = inventory.reduce((sum, item) => sum + item.qty, 0);
  document.getElementById("totalWeight").innerText = total.toLocaleString() + " kg";
  document.getElementById("alertCount").innerText = inventory.filter(i => i.qty < 50).length;
  document.getElementById("capacityPercent").innerText = Math.round((total / 10000) * 100) + "%";
}

function toggleModal(show) { document.getElementById("cropModal").style.display = show ? "flex" : "none"; }

function openAddModal() {
    document.getElementById("modalTitle").innerText = "📦 Register New Batch";
    document.getElementById("editIndex").value = "";
    document.getElementById("newName").value = "";
    document.getElementById("newOrigin").value = "";
    document.getElementById("newQty").value = "";
    toggleModal(true);
}

function openEditModal(index) {
    const item = inventory[index];
    document.getElementById("modalTitle").innerText = "✏️ Edit Batch Details";
    document.getElementById("editIndex").value = index;
    document.getElementById("newName").value = item.name;
    document.getElementById("newOrigin").value = item.origin;
    document.getElementById("newQuality").value = item.quality;
    document.getElementById("newQty").value = item.qty;
    toggleModal(true);
}

function saveCrop() {
    const idx = document.getElementById("editIndex").value;
    const name = document.getElementById("newName").value;
    const origin = document.getElementById("newOrigin").value;
    const qty = parseInt(document.getElementById("newQty").value);
    const quality = document.getElementById("newQuality").value;

    if(!name || !origin || isNaN(qty)) return showNotification("⚠️ Please fill all fields!");

    if(idx === "") {
        const batch = "BATCH-" + Math.floor(100 + Math.random() * 900);
        inventory.push({ name, qty, quality, origin, batch });
        showNotification("✅ Product added!");
    } else {
        inventory[idx] = { ...inventory[idx], name, qty, quality, origin };
        showNotification("📘 Product updated!");
    }
    renderInventory();
    toggleModal(false);
}

function modifyStock(index, amount) {
  if (amount < 0 && inventory[index].qty + amount < 0) return showNotification("❌ Insufficient stock!");
  inventory[index].qty += amount;
  renderInventory();
}

function deleteItem(index) {
  if(confirm("Delete this item?")) { inventory.splice(index, 1); renderInventory(); showNotification("🗑️ Item removed."); }
}

function searchTable() {
  let q = document.getElementById('searchBox').value.toLowerCase();
  let rows = document.getElementById('inventoryTable').getElementsByTagName('tr');
  for (let r of rows) r.style.display = r.innerText.toLowerCase().includes(q) ? "" : "none";
}

function showNotification(msg) {
  const n = document.getElementById("notif");
  n.innerText = msg; n.style.display = "block";
  setTimeout(() => n.style.display = "none", 3000);
}

function exportToExcel() {
  const ws = XLSX.utils.json_to_sheet(inventory);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Inventory");
  XLSX.writeFile(wb, "AgriSCM_Stock.xlsx");
}

renderInventory();
</script>
</body>
</html>
