<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agri-SCM | Pro Inventory v2.0</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Sora', sans-serif; }
  body { background: radial-gradient(circle at top right, #1a3c1a 0%, #051205 100%); min-height: 100vh; color: #fff; padding-bottom: 50px; }

  /* Navbar */
  header {
    background: rgba(10, 31, 10, 0.9); backdrop-filter: blur(15px);
    padding: 15px 5%; display: flex; justify-content: space-between; align-items: center;
    position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid #f1c40f;
  }
  header h2 { color: #f1c40f; font-size: 22px; }

  .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }

  /* Summary Cards */
  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
  .stat-card { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); text-align: center; transition: 0.3s; }
  .stat-card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.08); }
  .stat-card i { color: #f1c40f; font-size: 28px; margin-bottom: 12px; }
  .stat-card h4 { font-size: 13px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
  .stat-card p { font-size: 28px; font-weight: 700; color: #f1c40f; }

  /* Table Tools */
  .table-tools { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px; }
  .search-container { position: relative; flex-grow: 1; max-width: 400px; }
  .search-container i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #f1c40f; }
  #searchBox { padding: 14px 15px 14px 45px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: #fff; width: 100%; outline: none; transition: 0.3s; }
  #searchBox:focus { border-color: #f1c40f; box-shadow: 0 0 10px rgba(241, 196, 15, 0.2); }
  
  .tool-btns { display: flex; gap: 12px; }
  .btn { padding: 12px 20px; border-radius: 15px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px; font-size: 14px; }
  .btn-add { background: #f1c40f; color: #1a3c1a; }
  .btn-export { background: transparent; color: #f1c40f; border: 1px solid #f1c40f; }
  .btn:hover { transform: scale(1.05); filter: brightness(1.1); }

  /* Premium Table */
  .table-card { background: rgba(255,255,255,0.02); border-radius: 30px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 30px 60px rgba(0,0,0,0.5); }
  .table-responsive { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 800px; }
  th { background: #f1c40f; color: #1a3c1a; padding: 20px; text-align: left; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
  td { padding: 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); vertical-align: middle; }

  .crop-info strong { font-size: 16px; color: #f1c40f; display: block; margin-bottom: 4px; }
  .crop-info span { font-size: 12px; color: #888; }
  .batch-tag { background: rgba(255, 255, 255, 0.1); color: #fff; padding: 5px 10px; border-radius: 8px; font-size: 11px; font-family: monospace; }

  .badge { padding: 6px 14px; border-radius: 12px; font-size: 10px; font-weight: 800; display: inline-block; }
  .ok { background: rgba(46, 204, 113, 0.15); color: #2ecc71; border: 1px solid #2ecc71; }
  .low { background: rgba(231, 76, 60, 0.15); color: #e74c3c; border: 1px solid #e74c3c; animation: pulse 2s infinite; }

  .action-group { display: flex; gap: 8px; }
  .action-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; width: 32px; height: 32px; border-radius: 8px; cursor: pointer; transition: 0.2s; }
  .btn-plus:hover { background: #2ecc71; color: #fff; }
  .btn-minus:hover { background: #e67e22; color: #fff; }
  .btn-del:hover { background: #e74c3c; color: #fff; }

  /* Modal */
  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 2000; justify-content: center; align-items: center; }
  .modal-content { background: #1a3c1a; padding: 35px; border-radius: 35px; width: 100%; max-width: 450px; border: 2px solid #f1c40f; }
  .modal-content h3 { color: #f1c40f; margin-bottom: 25px; text-align: center; }
  .modal-content label { font-size: 11px; color: #f1c40f; text-transform: uppercase; font-weight: 700; margin-bottom: 8px; display: block; }
  .modal-content input, .modal-content select { width: 100%; padding: 14px; margin-bottom: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: white; outline: none; }

  #notif { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 15px 35px; background: #f1c40f; color: #1a3c1a; border-radius: 15px; font-weight: 800; display: none; z-index: 3000; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }

  @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
</style>
</head>

<body>

<header>
  <h2><i class="fa-solid fa-boxes-packing"></i> AGRI-SCM <span style="font-weight: 400; opacity: 0.7;">Inventory</span></h2>
  <nav>
    <a href="home.html" style="color:#e74c3c; font-weight:700; text-decoration: none;"><i class="fa-solid fa-door-open"></i> LOGOUT</a>
  </nav>
</header>

<div class="container">
  <div class="stats-row">
    <div class="stat-card">
      <i class="fa-solid fa-scale-balanced"></i>
      <h4>Total Stock</h4>
      <p id="totalWeight">0 kg</p>
    </div>
    <div class="stat-card">
      <i class="fa-solid fa-circle-exclamation"></i>
      <h4>Stock Alerts</h4>
      <p id="alertCount">0</p>
    </div>
    <div class="stat-card">
      <i class="fa-solid fa-chart-pie"></i>
      <h4>Warehouse Load</h4>
      <p id="capacityPercent">0%</p>
    </div>
  </div>

  <div class="table-tools">
    <div class="search-container">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" id="searchBox" placeholder="Search by crop, batch or origin..." onkeyup="searchTable()">
    </div>
    <div class="tool-btns">
      <button class="btn btn-export" onclick="exportToExcel()"><i class="fa-solid fa-file-excel"></i> EXCEL</button>
      <button class="btn btn-add" onclick="toggleModal(true)"><i class="fa-solid fa-plus"></i> ADD PRODUCT</button>
    </div>
  </div>

  <div class="table-card">
    <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>Product Details</th>
              <th>Batch ID</th>
              <th>Quality</th>
              <th>Current Stock</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="inventoryTable"></tbody>
        </table>
    </div>
  </div>
</div>

<div class="modal" id="addModal">
  <div class="modal-content">
    <h3>📦 Register New Batch</h3>
    <label>Product Name</label>
    <input type="text" id="newName" placeholder="e.g. Garlic">
    <label>Farm Origin</label>
    <input type="text" id="newOrigin" placeholder="e.g. Northern Farm">
    <label>Grade / Quality</label>
    <select id="newQuality" style="width: 100%; padding: 14px; border-radius: 12px; background: rgba(0,0,0,0.3); color: white; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px;">
        <option value="A+ Grade">A+ Premium</option>
        <option value="A Grade">A Grade</option>
        <option value="B Grade">B Grade</option>
    </select>
    <label>Quantity (kg)</label>
    <input type="number" id="newQty" placeholder="0">
    <div class="modal-actions" style="display:flex; gap:10px;">
      <button class="btn btn-add" style="flex:2; justify-content:center;" onclick="addNewCrop()">SAVE TO SYSTEM</button>
      <button class="btn btn-export" style="flex:1; justify-content:center; border-color:#e74c3c; color:#e74c3c" onclick="toggleModal(false)">CLOSE</button>
    </div>
  </div>
</div>

<div id="notif"></div>

<script>
let inventory = JSON.parse(localStorage.getItem("agriInventory") || `[
  { "name":"Red Tomato", "qty":450, "quality":"A Grade", "origin":"Dhaka Farm", "batch":"BATCH-771" },
  { "name":"Fresh Potato", "qty":800, "quality":"A+ Grade", "origin":"Bogura Agri", "batch":"BATCH-229" },
  { "name":"Hybrid Carrot", "qty":45, "quality":"B Grade", "origin":"Rajshahi Farm", "batch":"BATCH-110" }
]`);

function updateAnalytics() {
  let total = inventory.reduce((sum, item) => sum + item.qty, 0);
  let alerts = inventory.filter(item => item.qty < 50).length;
  let capacity = (total / 10000) * 100;

  document.getElementById("totalWeight").innerText = total.toLocaleString() + " kg";
  document.getElementById("alertCount").innerText = alerts;
  document.getElementById("capacityPercent").innerText = Math.round(capacity) + "%";
}

function renderInventory() {
  const table = document.getElementById("inventoryTable");
  table.innerHTML = "";

  inventory.forEach((item, index) => {
    const isLow = item.qty < 50;
    table.innerHTML += `
      <tr>
        <td>
          <div class="crop-info">
            <strong>${item.name}</strong>
            <span><i class="fa-solid fa-location-dot"></i> ${item.origin}</span>
          </div>
        </td>
        <td><span class="batch-tag">${item.batch}</span></td>
        <td><span style="font-size:12px; font-weight:600; color:#aaa">${item.quality}</span></td>
        <td style="font-weight:700; font-size:18px; color: #fff;">${item.qty} <small style="font-size:12px; color:#666">kg</small></td>
        <td><span class="badge ${isLow ? 'low' : 'ok'}">${isLow ? 'REPLENISH' : 'OPTIMAL'}</span></td>
        <td>
          <div class="action-group">
            <button class="action-btn btn-plus" onclick="modifyStock(${index}, 50)" title="Add 50kg"><i class="fa-solid fa-plus"></i></button>
            <button class="action-btn btn-minus" onclick="modifyStock(${index}, -50)" title="Remove 50kg"><i class="fa-solid fa-minus"></i></button>
            <button class="action-btn btn-del" onclick="deleteItem(${index})" title="Delete"><i class="fa-solid fa-trash"></i></button>
          </div>
        </td>
      </tr>
    `;
  });
  updateAnalytics();
  localStorage.setItem("agriInventory", JSON.stringify(inventory));
}

function toggleModal(show) {
  document.getElementById("addModal").style.display = show ? "flex" : "none";
}

function addNewCrop() {
  const name = document.getElementById("newName").value.trim();
  const origin = document.getElementById("newOrigin").value.trim();
  const qty = parseInt(document.getElementById("newQty").value);
  const quality = document.getElementById("newQuality").value;
  const batch = "BATCH-" + Math.floor(100 + Math.random() * 900);

  if(!name || !origin || isNaN(qty)) {
    showNotification("⚠️ Please fill all fields correctly!");
    return;
  }

  inventory.push({ name, qty, quality, origin, batch });
  renderInventory();
  toggleModal(false);
  showNotification(`✅ ${name} added successfully!`);
  
  // Clear fields
  document.getElementById("newName").value = "";
  document.getElementById("newOrigin").value = "";
  document.getElementById("newQty").value = "";
}

function modifyStock(index, amount) {
  if (amount < 0 && inventory[index].qty + amount < 0) {
    showNotification("❌ Insufficient stock!");
    return;
  }
  inventory[index].qty += amount;
  renderInventory();
}

function deleteItem(index) {
    if(confirm(`Are you sure you want to delete ${inventory[index].name}?`)) {
        inventory.splice(index, 1);
        renderInventory();
        showNotification("🗑️ Item removed from inventory.");
    }
}

function exportToExcel() {
    const ws = XLSX.utils.json_to_sheet(inventory);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Inventory_Report");
    XLSX.writeFile(wb, "AgriSCM_Stock_Report.xlsx");
}

function searchTable() {
  let input = document.getElementById('searchBox').value.toLowerCase();
  let rows = document.getElementById('inventoryTable').getElementsByTagName('tr');
  for (let row of rows) {
    row.style.display = row.innerText.toLowerCase().includes(input) ? "" : "none";
  }
}

function showNotification(msg) {
  const n = document.getElementById("notif");
  n.innerText = msg; n.style.display = "block";
  setTimeout(() => n.style.display = "none", 3000);
}

renderInventory();
</script>

</body>
</html>
