<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Agri-SCM | Smart Overview</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Sora', sans-serif; }
        
        body { 
            background: radial-gradient(circle at center, #1a4d1a 0%, #0b220b 100%); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Floating Animation */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .hero {
            background: rgba(255, 255, 255, 0.98); 
            padding: 3.5rem; 
            border-radius: 50px; 
            box-shadow: 0 30px 70px rgba(0,0,0,0.5); 
            text-align: center; 
            max-width: 950px; 
            width: 100%;
            position: relative;
            border: 2px solid #ffd700;
            backdrop-filter: blur(10px);
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            border-radius: 60px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            z-index: -1;
        }

        .heading-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            margin-bottom: 40px;
        }

        .heading-logo img {
            width: 140px;
            height: auto;
            animation: float 4s ease-in-out infinite;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
        }

        .text-content { text-align: left; }

        .text-content h1 {
            color: #0b220b; 
            font-size: 2.5rem;
            line-height: 1.1;
            font-weight: 800;
        }

        .text-content h1 span { color: #2e7d32; }

        .text-content p {
            color: #666;
            font-size: 1.1rem;
            margin-top: 10px;
            font-weight: 400;
        }

        /* Diagram Section Update */
        .diagram-box { 
            background: #ffffff; 
            padding: 30px; 
            border-radius: 35px; 
            margin: 30px 0; 
            border: 1px solid #e0e0e0;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.02);
            transition: 0.5s;
            position: relative;
        }

        .diagram-box:hover {
            transform: scale(1.02);
            border-color: #ffd700;
            box-shadow: 0 15px 40px rgba(0,0,0,0.08);
        }

        .diagram-box img {
            max-width: 100%;
            border-radius: 20px;
            display: block;
        }

        .badge-list {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 25px;
        }

        .badge {
            background: #f1f8f1;
            color: #1a4d1a;
            padding: 8px 18px;
            border-radius: 15px;
            font-size: 13px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(26, 77, 26, 0.1);
            transition: 0.3s;
        }

        .badge:hover {
            background: #1a4d1a;
            color: #ffd700;
            transform: translateY(-3px);
        }

        /* Enhanced Button */
        .btn { 
            margin-top: 15px;
            padding: 20px 50px; 
            background: #0b220b; 
            color: #ffd700; 
            text-decoration: none; 
            border-radius: 25px; 
            font-weight: 700; 
            font-size: 1.2rem;
            transition: 0.4s; 
            display: inline-flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 15px 35px rgba(11, 34, 11, 0.3);
        }

        .btn:hover { 
            background: #ffd700; 
            color: #0b220b;
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 20px 40px rgba(255, 215, 0, 0.4);
        }

        .btn i { transition: 0.3s; }
        .btn:hover i { transform: translateX(8px); }

        /* Responsive */
        @media (max-width: 768px) {
            .heading-logo { flex-direction: column; text-align: center; gap: 20px; }
            .text-content { text-align: center; }
            .text-content h1 { font-size: 2rem; }
            .hero { padding: 2rem; }
        }
    </style>
</head>
<body>

    <div class="hero">
        <div class="heading-logo">
            <img src="image.png" alt="Agri-SCM Logo">
            <div class="text-content">
                <h1>Smart <span>Agri-SCM</span> <br>System</h1>
                <p>Digital tools for better and sustainable farming.</p>
            </div>
        </div>

        <div class="diagram-box">
            <img src="Group-08_PS1_Rich Picture.drawio copy.png" alt="Rich Picture">
            
            <div class="badge-list">
                <div class="badge"><i class="fa-solid fa-wheat-awn"></i> Products</div>
                <div class="badge"><i class="fa-solid fa-boxes-stacked"></i> Inventory</div>
                <div class="badge"><i class="fa-solid fa-vial-circle-check"></i> Field Supervisor</div>
                <div class="badge"><i class="fa-solid fa-truck-ramp-box"></i> Product Quality</div>
            </div>
        </div>

        <p style="margin: 20px auto 35px; color: #777; font-size: 15px; max-width: 600px; line-height: 1.6;">
            Empowering the agricultural ecosystem with real-time tracking, quality assurance, and seamless logistics integration.
        </p>

        <a href="home.html" class="btn">
            Enter System <i class="fa-solid fa-circle-arrow-right"></i>
        </a>
    </div>

</body>
</html>
